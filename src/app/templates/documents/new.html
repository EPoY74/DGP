{% extends "base.html" %}

{% block content %}
    <h2>Новый документ</h2>

    <form action="{{ url_for('documents.preview_document') }}" method="post" class="form-card">
        <div class="form-row">
            <label for="document_title">Название документа</label>
            <input
                type="text"
                id="document_title"
                name="document_title"
                placeholder="Например: Акт осмотра"
                required
            >
        </div>

        <div class="form-row">
            <label for="document_number">Номер документа</label>
            <input
                type="text"
                id="document_number"
                name="document_number"
                placeholder="Например: 15/2026"
            >
        </div>

        <div class="form-row">
            <label for="document_date">Дата документа</label>
            <input
                type="date"
                id="document_date"
                name="document_date"
                required
            >
        </div>

        <div class="form-row">
            <label for="site_name">Объект (Site)</label>
            <input
                type="text"
                id="site_name"
                name="site_name"
                placeholder="Например: КНС-7"
                required
            >
        </div>

        <div class="form-row">
            <label for="customer_name">Получатель / заказчик</label>
            <input
                type="text"
                id="customer_name"
                name="customer_name"
                placeholder="Например: МУП Водоканал"
                required
            >
        </div>

        <div class="form-row">
            <label for="note">Примечание</label>
            <textarea
                id="note"
                name="note"
                rows="5"
                placeholder="Введите текст примечания"
            ></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">Сформировать предпросмотр</button>
        </div>
    </form>
{% endblock %}
